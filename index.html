<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>Tavariş Bilet Kontrol</title>
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:auto}
    body{font-family:Georgia,serif;background:#faf8f0;color:#1a4480}
    .container{min-height:100vh;display:flex;flex-direction:column;padding:12px;max-width:500px;margin:0 auto}
    .header{text-align:center;padding:12px 0}
    .logo{font-size:11px;letter-spacing:4px;color:#c41e3a;margin-bottom:2px;font-weight:600}
    .title{font-size:28px;font-weight:400;color:#1a4480;letter-spacing:2px}
    .subtitle{font-size:10px;color:#888;margin-top:2px;letter-spacing:2px}
    #loginSection{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
    .login-box{width:100%;max-width:300px}
    .login-title{font-size:16px;text-align:center;margin-bottom:24px;color:#1a4480}
    .input{width:100%;padding:14px;font-size:18px;border:2px solid #e0d5c7;border-radius:8px;background:#fff;color:#1a4480;text-align:center;letter-spacing:4px;font-family:Georgia,serif;margin-bottom:16px}
    .input:focus{outline:none;border-color:#1a4480}
    .btn{width:100%;padding:14px;font-size:14px;border:none;border-radius:8px;cursor:pointer;letter-spacing:2px;font-family:Georgia,serif}
    .btn-primary{background:#1a4480;color:#faf8f0}
    .btn-primary:disabled{background:#999}
    .error-msg{color:#c41e3a;text-align:center;margin-top:12px;font-size:13px;display:none}
    #scannerSection{flex:1;display:none;flex-direction:column}
    .date-selector{display:flex;gap:10px;padding:8px 0}
    .date-btn{flex:1;padding:12px 8px;border:2px solid #e0d5c7;border-radius:10px;background:#fff;color:#888;font-size:14px;cursor:pointer;font-family:Georgia,serif;text-align:center;transition:all 0.2s}
    .date-btn.active{border-color:#1a4480;background:#1a4480;color:#faf8f0}
    .date-btn .day{font-size:22px;display:block}
    .stats{display:flex;gap:6px;padding:8px 0}
    .stat{flex:1;background:#fff;border:1px solid #e0d5c7;border-radius:6px;padding:8px 4px;text-align:center}
    .stat-value{font-size:22px}
    .stat-label{font-size:9px;color:#888;letter-spacing:1px}
    .stat.green .stat-value{color:#2e7d32}
    .stat.blue .stat-value{color:#1a4480}
    .stat.red .stat-value{color:#c41e3a}
    .scanner-box{background:#fff;border:2px solid #1a4480;border-radius:12px;padding:15px;margin:10px 0}
    .scanner-box h3{color:#1a4480;font-size:14px;margin-bottom:12px;text-align:center;font-weight:400}
    #video{width:100%;border-radius:8px;background:#000;display:block}
    #canvas{display:none}
    .camera-status{text-align:center;padding:10px;font-size:13px;color:#888}
    .camera-status.error{color:#c41e3a}
    .camera-status.success{color:#2e7d32}
    .manual-section{margin-top:15px;padding-top:15px;border-top:1px solid #e0d5c7}
    .manual-section h4{font-size:12px;color:#888;text-align:center;margin-bottom:10px;font-weight:400}
    .qr-input{width:100%;padding:10px;font-size:13px;border:2px solid #e0d5c7;border-radius:8px;font-family:monospace;margin-bottom:10px;resize:none}
    .qr-input:focus{outline:none;border-color:#1a4480}
    .loading-overlay{position:fixed;inset:0;background:rgba(26,68,128,0.9);display:none;align-items:center;justify-content:center;z-index:500;flex-direction:column}
    .loading-spinner{width:48px;height:48px;border:4px solid #faf8f0;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite}
    .loading-text{color:#faf8f0;margin-top:12px;font-size:14px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .modal-overlay{position:fixed;inset:0;background:rgba(26,68,128,0.95);display:none;align-items:center;justify-content:center;z-index:1000;padding:12px}
    .modal{width:100%;max-width:92vw;background:#faf8f0;border-radius:20px;overflow:hidden;border:4px solid #1a4480}
    .modal-header{padding:24px 20px;text-align:center}
    .modal-icon{font-size:56px;margin-bottom:8px}
    .modal-title{font-size:24px;color:#faf8f0}
    .modal-message{color:rgba(250,248,240,0.85);font-size:14px;margin-top:4px}
    .modal-body{padding:16px 20px;background:#fff}
    .modal-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #e0d5c7}
    .modal-row:last-child{border-bottom:none}
    .modal-label{color:#888;font-size:14px}
    .modal-value{color:#1a4480;font-weight:600;font-size:16px;text-align:right}
    .modal-footer{padding:14px 20px;background:#f5f0e6}
    .btn-close{width:100%;padding:14px;background:#1a4480;border:none;border-radius:10px;color:#faf8f0;font-size:15px;cursor:pointer;font-family:Georgia,serif;letter-spacing:2px}
    .modal-ok .modal-header{background:linear-gradient(135deg,#2e7d32,#4caf50)}
    .modal-pending .modal-header{background:linear-gradient(135deg,#f57c00,#ff9800)}
    .modal-used .modal-header{background:linear-gradient(135deg,#c41e3a,#e53935)}
    .modal-invalid .modal-header{background:linear-gradient(135deg,#616161,#9e9e9e)}
    .modal-wrong_date .modal-header{background:linear-gradient(135deg,#7b1fa2,#9c27b0)}
    .modal-error .modal-header{background:linear-gradient(135deg,#c41e3a,#e53935)}
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">ANKARA</div>
      <div class="title">Tavariş</div>
      <div class="subtitle">BİLET KONTROL</div>
    </div>
    
    <div id="loginSection">
      <div class="login-box">
        <div class="login-title">Görevli Girişi</div>
        <input type="password" id="pinInput" class="input" maxlength="4" inputmode="numeric" placeholder="••••">
        <button class="btn btn-primary" id="loginBtn">GİRİŞ YAP</button>
        <div class="error-msg" id="pinError">PIN hatalı</div>
      </div>
    </div>
    
    <div id="scannerSection">
      <div class="date-selector">
        <button class="date-btn" id="btnGun1"><span class="day">6</span>Mart</button>
        <button class="date-btn" id="btnGun2"><span class="day">9</span>Mart</button>
      </div>
      
      <div class="stats">
        <div class="stat green"><div class="stat-value" id="statUsed">-</div><div class="stat-label">GİRİŞ</div></div>
        <div class="stat blue"><div class="stat-value" id="statTotal">-</div><div class="stat-label">ONAYLI</div></div>
        <div class="stat red"><div class="stat-value" id="statRemaining">-</div><div class="stat-label">KALAN</div></div>
      </div>
      
      <div class="scanner-box">
        <h3>📷 QR Tarayıcı</h3>
        <video id="video" playsinline autoplay muted></video>
        <canvas id="canvas"></canvas>
        <div class="camera-status" id="cameraStatus">Kamerayı başlatmak için butona basın</div>
        <button class="btn btn-primary" id="startCamBtn" style="margin-top:10px">KAMERAYI BAŞLAT</button>
        
        <div class="manual-section">
          <h4>veya manuel giriş yapın</h4>
          <textarea id="qrInput" class="qr-input" rows="2" placeholder="QR kodunu buraya yapıştırın..."></textarea>
          <button class="btn btn-primary" id="verifyBtn">KONTROL ET</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">KONTROL EDİLİYOR</div>
  </div>
  
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-icon" id="modalIcon"></div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-message" id="modalMessage"></div>
      </div>
      <div class="modal-body">
        <div class="modal-row"><span class="modal-label">Ad Soyad</span><span class="modal-value" id="modalName">-</span></div>
        <div class="modal-row"><span class="modal-label">Telefon</span><span class="modal-value" id="modalPhone">-</span></div>
        <div class="modal-row"><span class="modal-label">Bilet No</span><span class="modal-value" id="modalBiletNo">-</span></div>
        <div class="modal-row"><span class="modal-label">Toplam</span><span class="modal-value" id="modalToplam">-</span></div>
        <div class="modal-row"><span class="modal-label">Okutulan</span><span class="modal-value" id="modalOkutulan">-</span></div>
      </div>
      <div class="modal-footer">
        <button class="btn-close" id="modalClose">TAMAM</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwCr9kPQtKWLeqDhfCfX9dtlWvyc5GHwf1nM0djj1nL4yOW9slve2Mzsk-2Bw2aHqg7Vg/exec';
    const PIN = '4321';
    
    let selectedDate = null;
    let video, canvas, ctx;
    let scanning = false;
    let processing = false;
    let currentPin = '';

    function $(id) { return document.getElementById(id); }

    // Login
    function login() {
      currentPin = $('pinInput').value;
      if (currentPin === PIN) {
        $('loginSection').style.display = 'none';
        $('scannerSection').style.display = 'flex';
      } else {
        $('pinError').style.display = 'block';
      }
    }

    // Tarih seçimi
    function selectDate(d) {
      selectedDate = d;
      $('btnGun1').classList.toggle('active', d === '6');
      $('btnGun2').classList.toggle('active', d === '9');
      updateStats();
    }

    // İstatistik güncelle
    async function updateStats() {
      if (!selectedDate) return;
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'stats', date: selectedDate, pin: currentPin })
        });
        // no-cors modunda response okunamaz, bu yüzden alternatif yol kullanacağız
      } catch (err) {
        console.log('Stats error:', err);
      }
    }

    // Kamera başlat
    function startCamera() {
      video = $('video');
      canvas = $('canvas');
      ctx = canvas.getContext('2d', { willReadFrequently: true });
      
      $('cameraStatus').textContent = 'Kamera başlatılıyor...';
      $('cameraStatus').className = 'camera-status';
      $('startCamBtn').style.display = 'none';

      navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }
      })
      .then(stream => {
        video.srcObject = stream;
        video.play();
        video.onloadedmetadata = () => {
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          scanning = true;
          $('cameraStatus').textContent = '✓ Kamera aktif - QR kodu gösterin';
          $('cameraStatus').className = 'camera-status success';
          requestAnimationFrame(scanFrame);
        };
      })
      .catch(err => {
        $('cameraStatus').textContent = 'Kamera hatası: ' + err.message;
        $('cameraStatus').className = 'camera-status error';
        $('startCamBtn').style.display = 'block';
        $('startCamBtn').textContent = 'TEKRAR DENE';
      });
    }

    // QR tarama döngüsü
    function scanFrame() {
      if (!scanning) return;
      
      if (video.readyState === video.HAVE_ENOUGH_DATA && !processing) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'dontInvert' });
        
        if (code && code.data) {
          processing = true;
          $('cameraStatus').textContent = 'QR bulundu, kontrol ediliyor...';
          verifyQR(code.data);
          return;
        }
      }
      requestAnimationFrame(scanFrame);
    }

    // Manuel kontrol
    function verifyManual() {
      const qr = $('qrInput').value.trim();
      if (!qr) {
        alert('Lütfen QR kodu girin');
        return;
      }
      if (!selectedDate) {
        alert('Lütfen tarih seçin');
        return;
      }
      verifyQR(qr);
    }

    // QR doğrulama - API'ye istek at
    async function verifyQR(qr) {
      if (!selectedDate) {
        alert('Lütfen önce tarih seçin');
        processing = false;
        return;
      }
      
      $('loadingOverlay').style.display = 'flex';
      
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ 
            action: 'verify', 
            qr: qr, 
            date: selectedDate, 
            pin: currentPin 
          })
        });
        
        const result = await response.json();
        showResult(result);
      } catch (err) {
        showResult({ status: 'error', title: 'Bağlantı Hatası', message: err.toString() });
      }
    }

    // Sonuç göster
    function showResult(res) {
      $('loadingOverlay').style.display = 'none';
      
      const icons = {
        ok: '✅', pending: '⏳', used: '⛔', 
        invalid: '❌', wrong_date: '📅', error: '⚠️'
      };
      
      $('modal').className = 'modal modal-' + res.status;
      $('modalIcon').textContent = icons[res.status] || '?';
      $('modalTitle').textContent = res.title || '';
      $('modalMessage').textContent = res.message || '';
      $('modalName').textContent = res.adSoyad || '-';
      $('modalPhone').textContent = res.telefon || '-';
      $('modalBiletNo').textContent = res.biletNo ? '#' + res.biletNo : '-';
      $('modalToplam').textContent = res.toplam || '-';
      $('modalOkutulan').textContent = res.okutulan !== null && res.okutulan !== undefined 
        ? res.okutulan + '/' + res.toplam : '-';
      
      $('modalOverlay').style.display = 'flex';
    }

    // Modal kapat
    function closeModal() {
      $('modalOverlay').style.display = 'none';
      processing = false;
      $('qrInput').value = '';
      $('cameraStatus').textContent = '✓ Kamera aktif - QR kodu gösterin';
      $('cameraStatus').className = 'camera-status success';
      
      if (scanning) {
        requestAnimationFrame(scanFrame);
      }
    }

    // Event listeners
    $('loginBtn').onclick = login;
    $('pinInput').onkeydown = (e) => { if (e.key === 'Enter') login(); };
    $('btnGun1').onclick = () => selectDate('6');
    $('btnGun2').onclick = () => selectDate('9');
    $('startCamBtn').onclick = startCamera;
    $('verifyBtn').onclick = verifyManual;
    $('modalClose').onclick = closeModal;
    $('modalOverlay').onclick = (e) => { if (e.target === $('modalOverlay')) closeModal(); };
  </script>
</body>
</html>
